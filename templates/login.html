<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex items-center justify-center h-screen bg-gray-100">

<form method="POST" class="bg-white p-6 rounded shadow w-80">
    {% csrf_token %}

    <h2 class="text-xl font-bold mb-4">Employee Login</h2>

    <input name="username" placeholder="Employee ID" class="border p-2 w-full mb-2">

    <input name="password" type="password" placeholder="Password" class="border p-2 w-full mb-2">

    <button class="bg-blue-500 text-white w-full p-2 rounded">Login</button>

    {% if error %}
        <p class="text-red-500 mt-2">{{ error }}</p>
    {% endif %}
</form>

</body>
</html>
