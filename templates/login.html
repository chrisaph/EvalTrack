{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EvalTrack</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>
<body class="min-h-screen flex items-center justify-center p-4">

<form method="POST" class="login-card p-8 rounded-2xl shadow-2xl w-full max-w-md" id="loginForm">
    {% csrf_token %}

    <div class="text-center mb-8">
        <div class="mb-4">
            <svg class="w-16 h-16 mx-auto text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
            </svg>
        </div>
        <h1 class="title text-3xl font-bold mb-1">EvalTrack</h1>
        <h2 class="text-xl text-gray-700 mb-2">Employee Login</h2>
        <p class="text-sm text-gray-500">Use your Employee ID and assigned password</p>
    </div>

    <div class="mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-2">
            <svg class="w-4 h-4 inline mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V8a2 2 0 00-2-2h-5m-4 0V5a2 2 0 114 0v1m-4 0a2 2 0 104 0m-5 8a2 2 0 100-4 2 2 0 000 4zm0 0c1.306 0 2.417.835 2.83 2M9 14a3.001 3.001 0 00-2.83 2M15 11h3m-3 4h2"></path>
            </svg>
            Employee ID
        </label>
        <input
            name="username"
            id="username"
            placeholder="Enter your Employee ID"
            class="input-field w-full px-4 py-3 rounded-lg focus:outline-none"
            autocomplete="username"
            required
        >
    </div>

    <div class="mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-2">
            <svg class="w-4 h-4 inline mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
            </svg>
            Password
        </label>
        <div class="relative">
            <input
                name="password"
                id="password"
                type="password"
                placeholder="Enter your password"
                class="input-field w-full px-4 py-3 rounded-lg focus:outline-none pr-12"
                autocomplete="current-password"
                required
            >
            <span class="password-toggle absolute right-4 top-1/2 transform -translate-y-1/2 text-gray-400" onclick="togglePassword()">
                <svg id="eyeIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                </svg>
            </span>
        </div>
    </div>

    <button type="submit" class="submit-btn bg-gradient-to-r from-indigo-600 to-purple-600 text-white w-full py-3 rounded-lg font-medium relative">
        <span class="relative z-10" id="btnText">Login</span>
    </button>

    {% if error %}
        <div class="error-message mt-4 p-3 bg-red-50 border border-red-200 rounded-lg flex items-center text-red-700 text-sm">
            <svg class="w-5 h-5 mr-2 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"></path>
            </svg>
            <span>{{ error }}</span>
        </div>
    {% endif %}

    <div class="mt-6 text-center">
        <a href="/" class="inline-flex items-center text-sm text-gray-600 hover:text-indigo-600 transition">
            <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
            </svg>
            Back to Home
        </a>
    </div>

    <div class="mt-6 pt-6 border-t border-gray-200 text-center">
        <p class="text-xs text-gray-500">© 2026 EvalTrack. Secure Login Portal</p>
    </div>
</form>

<script src="{% static 'js/login.js' %}"></script>
</body>
</html>
