<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex items-center justify-center h-screen bg-gray-100">

<form method="POST" class="bg-white p-6 rounded-xl shadow w-80">
    {% csrf_token %}

    <h1 class="text-2xl font-bold text-center mb-1">EvalTrack</h1>
    <h2 class="text-lg text-center text-gray-600 mb-2">Employee Login</h2>

    <p class="text-xs text-gray-500 text-center mb-4">
        Use your Employee ID and assigned password
    </p>

    <input name="username" placeholder="Employee ID"
    class="border p-2 w-full mb-3 rounded focus:outline-none focus:ring-2 focus:ring-blue-400">

    <input name="password" type="password" placeholder="Password"
    class="border p-2 w-full mb-3 rounded focus:outline-none focus:ring-2 focus:ring-blue-400">

    <button class="bg-blue-500 hover:bg-blue-600 text-white w-full p-2 rounded transition">
        Login
    </button>

    {% if error %}
        <p class="text-red-500 mt-3 text-sm text-center">{{ error }}</p>
    {% endif %}

    <a href="/" class="block text-center text-sm text-gray-500 mt-4 hover:underline">
        ← Back to Home
    </a>
</form>

</body>
</html>
