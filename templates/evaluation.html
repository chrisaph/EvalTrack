<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EvalTrack - Year End Review</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-6">

<div class="max-w-5xl mx-auto bg-white p-6 rounded-xl shadow">

    <h1 class="text-2xl font-bold mb-4">Year-End Evaluation</h1>

    <!-- EMPLOYEE INFO -->
    <div class="grid grid-cols-2 gap-4 mb-6">

        <!-- Employee Search -->
        <input list="employeeList" id="employee" placeholder="Search Name" class="border p-2 rounded col-span-2">

        <datalist id="employeeList"></datalist>

        <!-- Level (auto-filled) -->
    <div class="col-span-2 text-sm text-gray-700 bg-gray-100 p-3 rounded">
        <p><strong>Employee ID:</strong> <span id="employeeIdText">-</span></p>
        <p><strong>Position:</strong> <span id="positionText">-</span></p>
        <p><strong>Department:</strong> <span id="departmentText">-</span></p>
        <p><strong>Level:</strong> <span id="levelText">-</span></p>
        <p><strong>Immediate Superior:</strong> <span id="managerText">-</span></p>
        <p><strong>Company Objective:</strong> <span id="companyPercent">-</span>%</p>
        <p><strong>Individual Objective:</strong> <span id="individualPercent">-</span>%</p>
    </div>

<p id="period" class="border p-2 rounded col-span-2 bg-gray-100"></p>
</div>
    <!-- OBJECTIVES -->
    <div>
        <h2 class="text-xl font-semibold mb-2">Objectives</h2>

        <div id="objectives-container"></div>

        <button onclick="addObjective()" class="mt-3 bg-blue-500 text-white px-4 py-2 rounded">
            + Add Objective
        </button>
    </div>

    <!-- COMMENTS -->
    <div class="mt-6">
        <textarea id="employee_comment" placeholder="Employee Comments" class="w-full border p-2 rounded mb-2"></textarea>
    </div>

    <!-- SUBMIT -->
    <button onclick="submitEvaluation()" class="mt-4 bg-green-600 text-white px-6 py-2 rounded">
        Submit Evaluation
    </button>

</div>

<script>

const API_BASE = "http://127.0.0.1:8000/api";

let employeesData = []; // store employees for later use




//Year subtract for performance period
function setPerformancePeriod() {
    const year = new Date().getFullYear() - 1;
    document.getElementById("period").innerHTML = `<strong>Year:</strong> ${year}`;
}


// ========================
// AUTO-FILL LEVEL
// ========================
document.getElementById("employee").addEventListener("change", function () {
    const selected = employeesData.find(
        e => e.name.toLowerCase() === this.value.toLowerCase()
    );

    if (selected) {
    document.getElementById("employeeIdText").textContent = selected.employee_id;
    document.getElementById("positionText").textContent = selected.position;
    document.getElementById("departmentText").textContent = selected.department;

    document.getElementById("levelText").textContent = selected.level_name;

    // 🔥 NEW
    document.getElementById("managerText").textContent = selected.manager_name || "-";

    document.getElementById("companyPercent").textContent = selected.level_company_percentage || "-";
    document.getElementById("individualPercent").textContent = selected.level_individual_percentage || "-";
} else {
    document.getElementById("employeeIdText").textContent = "-";
    document.getElementById("positionText").textContent = "-";
    document.getElementById("departmentText").textContent = "-";

    document.getElementById("levelText").textContent = "Invalid employee";

    // 🔥 NEW
    document.getElementById("managerText").textContent = "-";

    document.getElementById("companyPercent").textContent = "-";
    document.getElementById("individualPercent").textContent = "-";
}
});

//SEARCH EMPLOYEE:

async function loadEmployees() {
    const res = await fetch(`${API_BASE}/employees/`);
    const data = await res.json();

    employeesData = data;

    const list = document.getElementById("employeeList");

    data.forEach(emp => {
        const option = document.createElement("option");
        option.value = emp.name; // searchable text
        option.dataset.id = emp.id;
        list.appendChild(option);
    });
}



// ========================
// ADD OBJECTIVE
// ========================
let objectiveCount = 0;

function addObjective() {
    if (objectiveCount >= 5) {
        alert("Maximum 5 objectives only");
        return;
    }

    objectiveCount++;

    const container = document.getElementById("objectives-container");

    const div = document.createElement("div");
    div.className = "border p-3 rounded mt-2";

    div.innerHTML = `
        <p class="font-semibold mb-1">Goal ${objectiveCount}</p>

        <input placeholder="Description" class="border p-1 w-full mb-1 description">

        <input type="number" placeholder="Weight %" class="border p-1 w-full mb-1 weight">

        <input placeholder="Measure" class="border p-1 w-full mb-1 measure">

        <input placeholder="Target" class="border p-1 w-full mb-1 target">
    `;

    container.appendChild(div);
}


// ========================
// SUBMIT
// ========================
async function submitEvaluation() {

    const employeeName = document.getElementById("employee").value;

    const selectedEmployee = employeesData.find(
    e => e.name.toLowerCase() === employeeName.toLowerCase());

    if (!selectedEmployee) {
        alert("Please select a valid employee");
        return;
    }

    const employee = selectedEmployee.id;

    const period = (new Date().getFullYear() - 1).toString();
    const comment = document.getElementById("employee_comment").value;

    const objectiveDivs = document.querySelectorAll("#objectives-container > div");

    if (objectiveDivs.length < 3) {
        alert("Minimum 3 objectives required");
        return;
    }

    let objectives = [];

    objectiveDivs.forEach((div, index) => {
        objectives.push({
            order: index + 1,
            description: div.querySelector(".description").value,
            weight: parseFloat(div.querySelector(".weight").value),
            measure: div.querySelector(".measure").value,
            target: div.querySelector(".target").value
        });
    });

    const payload = {
        employee: employee,
        performance_period: period,
        employee_comment: comment,
        objectives: objectives
    };

    const res = await fetch(`${API_BASE}/evaluations/`, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(payload)
    });

    if (res.ok) {
        alert("Evaluation submitted!");
        location.reload();
    } else {
        const err = await res.json();
        console.error(err);
        alert("Error submitting evaluation");
    }
}

// ========================
// INIT
// ========================
loadEmployees();
setPerformancePeriod();

</script>

</body>
</html>
