<!DOCTYPE html>
<html>
<head>
    <title>Manager Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-6 bg-gray-100">

<h1 class="text-2xl font-bold mb-4">Manager Dashboard</h1>

<div class="bg-white p-4 rounded shadow">

    <h2 class="text-lg font-semibold mb-2">Your Employees</h2>

    {% for emp in employees %}
        <div class="border p-3 mb-2 rounded flex justify-between">
            <div>
                <p class="font-semibold">{{ emp.name }}</p>
                <p class="text-sm text-gray-500">{{ emp.position }}</p>
            </div>

            <a href="/manager/evaluation/{{ emp.evaluations.last.id }}/"
               class="bg-blue-500 text-white px-4 py-1 rounded">
                Review
            </a>
        </div>
    {% empty %}
        <p>No employees assigned.</p>
    {% endfor %}

</div>

</body>
</html>
