<!DOCTYPE html>
<html>
<head>
    <title>Manager Evaluation</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-6 bg-gray-100">

<div class="max-w-4xl mx-auto bg-white p-6 rounded shadow">

<h1 class="text-xl font-bold mb-4">
    Manager Evaluation - {{ evaluation.employee.name }}
</h1>

{% for obj in evaluation.objectives.all %}
<div class="border p-3 mb-3 rounded">

    <p class="font-semibold">Goal {{ obj.order }}</p>

    <p><strong>Description:</strong> {{ obj.description }}</p>
    <p><strong>Weight:</strong> {{ obj.weight }}%</p>
    <p><strong>Employee Actual:</strong> {{ obj.employee_actual }}%</p>

    <input type="number"
           placeholder="Manager Actual (%)"
           value="{{ obj.manager_actual }}"
           class="border p-2 w-full mt-2 manager_actual"
           data-id="{{ obj.id }}">

</div>
{% endfor %}

<textarea id="manager_comment"
class="w-full border p-2 rounded mt-3"
placeholder="Manager Comments">{{ evaluation.manager_comment }}</textarea>

<button onclick="submitManagerEvaluation({{ evaluation.id }})"
class="mt-4 bg-green-600 text-white px-6 py-2 rounded">
Save Evaluation
</button>

</div>

<script>
function getCSRFToken() {
    return document.cookie
        .split('; ')
        .find(row => row.startsWith('csrftoken='))
        ?.split('=')[1];
}

async function submitManagerEvaluation(evaluationId) {

    const inputs = document.querySelectorAll(".manager_actual");

    let objectives = [];

    for (let input of inputs) {
        objectives.push({
        id: parseInt(input.dataset.id),   // 🔥 CRITICAL
        manager_actual: parseFloat(input.value)
    });
    }

    const payload = {
        manager_comment: document.getElementById("manager_comment").value,
        objectives: objectives
    };

    console.log("SENDING:", objectives);  // 🔥 ADD HERE

    await fetch(`/api/evaluations/${evaluationId}/`, {
        method: "PATCH",
        headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": getCSRFToken()
        },
        body: JSON.stringify(payload)
    });

    alert("Manager evaluation saved!");
    window.location.href = "/manager/";
}
</script>

</body>
</html>
